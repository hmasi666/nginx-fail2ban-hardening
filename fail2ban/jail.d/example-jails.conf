# Example Fail2ban jail configuration

# This is a sanitized version of a real setup

[sshd]
enabled = true
port = ssh
logpath = /var/log/auth.log
maxretry = 5
bantime = 1h

[nginx-http-auth]
enabled = true
port = http,https
logpath = /var/log/nginx/error.log

[nginx-botsearch]
enabled = true
port = http,https
logpath = /var/log/nginx/access.log

[nginx-common-attacks]
enabled = true
port = http,https
logpath = /var/log/nginx/access.log

[nginx-cve-scan]
enabled = true
port = http,https
logpath = /var/log/nginx/access.log

[uwsgi-php-eval]
enabled = true
port = http,https
logpath = /var/log/nginx/access.log
