# Basic Nginx hardening rules
# Sanitized public example

# Deny access to hidden files except Let's Encrypt challenges
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to potentially dangerous file types
location ~* \.(php|phar|phtml|pl|py|cgi|asp|aspx|sh|bash)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Block common sensitive files
location ~* /(composer\.(json|lock)|package\.json|yarn\.lock|Dockerfile|docker-compose\.yml|\.env)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Disable server tokens
server_tokens off;
